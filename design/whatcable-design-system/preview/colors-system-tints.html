<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WhatCable. Color tokens</title>
<link rel="stylesheet" href="./colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 20px; background: #fff; }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 6px; align-items: stretch; }
  .chip { height: 56px; border-radius: 8px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04); }
  .name { font-size: 11px; font-weight: 600; color: var(--fg-primary); }
  .hex  { font-size: 10px; color: var(--fg-secondary); font-family: var(--font-mono); }
  h4 { margin: 0 0 12px; font-size: 11px; color: var(--fg-secondary); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
</style>
</head>
<body>
  <h4>System tints. light mode</h4>
  <div class="row">
    <div class="sw"><div class="chip" style="background: var(--tint-blue)"></div><div class="name">Blue · Data</div><div class="hex">#007AFF</div></div>
    <div class="sw"><div class="chip" style="background: var(--tint-purple)"></div><div class="name">Purple · TB/USB4</div><div class="hex">#AF52DE</div></div>
    <div class="sw"><div class="chip" style="background: var(--tint-teal)"></div><div class="name">Teal · DisplayPort</div><div class="hex">#30B0C7</div></div>
    <div class="sw"><div class="chip" style="background: var(--tint-yellow)"></div><div class="name">Yellow · Charging</div><div class="hex">#FFCC00</div></div>
    <div class="sw"><div class="chip" style="background: var(--tint-orange)"></div><div class="name">Orange · Warn</div><div class="hex">#FF9500</div></div>
    <div class="sw"><div class="chip" style="background: var(--tint-green)"></div><div class="name">Green · OK</div><div class="hex">#34C759</div></div>
    <div class="sw"><div class="chip" style="background: var(--tint-red)"></div><div class="name">Red · Error</div><div class="hex">#FF3B30</div></div>
  </div>
</body>
</html>
