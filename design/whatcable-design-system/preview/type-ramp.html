<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WhatCable. Type</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./colors_and_type.css">
<style>
  :root { --font: "Geist", -apple-system, system-ui, sans-serif; }
  body {
    margin: 0; padding: 28px 32px;
    background: #fff;
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }
  *, *::before, *::after { box-sizing: border-box; }

  .title {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--fg-tertiary);
    margin-bottom: 22px;
  }

  .row {
    display: grid;
    grid-template-columns: 100px 1fr 80px;
    gap: 24px;
    align-items: baseline;
    padding: 18px 0;
    border-top: 1px solid rgba(0,0,0,0.06);
  }
  .row:first-of-type { border-top: 0; }
  .name {
    font-size: 11px; font-weight: 500;
    color: var(--fg-tertiary);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .sample {
    color: var(--fg-primary);
    letter-spacing: -0.01em;
  }
  .meta {
    font-size: 11px;
    color: var(--fg-tertiary);
    text-align: right;
    font-feature-settings: "tnum";
  }

  .v-value   { font-size: 22px; font-weight: 500; letter-spacing: -0.025em; }
  .v-name    { font-size: 14px; font-weight: 500; }
  .v-body    { font-size: 13px; font-weight: 400; color: var(--fg-secondary); }
  .v-caption { font-size: 10px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-tertiary); }
</style>
</head>
<body>
  <div class="title">Type</div>

  <div class="row">
    <div class="name">Value</div>
    <div class="sample v-value">30 W</div>
    <div class="meta">22 / 500</div>
  </div>
  <div class="row">
    <div class="name">Name</div>
    <div class="sample v-name">MagSafe</div>
    <div class="meta">14 / 500</div>
  </div>
  <div class="row">
    <div class="name">Body</div>
    <div class="sample v-body">Charging well</div>
    <div class="meta">13 / 400</div>
  </div>
  <div class="row">
    <div class="name">Caption</div>
    <div class="sample v-caption">WhatCable</div>
    <div class="meta">10 / 500</div>
  </div>

</body>
</html>
