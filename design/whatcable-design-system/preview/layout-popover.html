<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WhatCable. Popover layout</title>
<link rel="stylesheet" href="./colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: #fff; font-family: var(--font-system); }
  .frame { width: 520px; border: 1px solid var(--separator); border-radius: 8px; overflow: hidden; }
  .row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 11px; color: var(--fg-secondary); }
  .row.body { padding: 14px; gap: 12px; background: rgba(0,0,0,0.015); }
  .col { display: flex; flex-direction: column; flex: 1; gap: 2px; }
  .key { font-size: 10px; color: var(--fg-tertiary); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; }
  .val { font-size: 12px; color: var(--fg-primary); }
  hr { height: 1px; background: var(--separator); border: 0; margin: 0; }
  svg { width: 14px; height: 14px; color: var(--fg-secondary); flex: 0 0 14px; }
</style>
</head>
<body>
  <div class="frame">
    <div class="row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="6" rx="1"/></svg>
      <div class="col"><span class="key">Header</span></div>
      <span class="val">12px · pinned</span>
    </div>
    <hr>
    <div class="row body">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      <div class="col"><span class="key">Scroll body</span></div>
      <span class="val">12px gaps · cards stack</span>
    </div>
    <hr>
    <div class="row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="15" width="18" height="6" rx="1"/></svg>
      <div class="col"><span class="key">Footer</span></div>
      <span class="val">8px · pinned</span>
    </div>
  </div>
</body>
</html>
