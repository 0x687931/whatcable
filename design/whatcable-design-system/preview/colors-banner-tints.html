<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WhatCable. Tinted banner backgrounds</title>
<link rel="stylesheet" href="./colors_and_type.css">
<style>
  body { margin: 0; padding: 14px 16px; background: #fff; }
  .stack { display: grid; gap: 8px; }
  .pill { display: flex; gap: 8px; align-items: flex-start; padding: 10px; border-radius: 8px; }
  .ico { width: 16px; height: 16px; flex: 0 0 16px; margin-top: 1px; }
  .ico svg { width: 16px; height: 16px; }
  .t1 { font-size: 12px; font-weight: 700; line-height: 1.2; }
  .t2 { font-size: 10px; color: var(--fg-secondary); margin-top: 2px; }
  h4 { margin: 0 0 12px; font-size: 11px; color: var(--fg-secondary); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
</style>
</head>
<body>
  <h4>Inline banner tints. 12% opacity fill</h4>
  <div class="stack">
    <div class="pill" style="background: var(--bg-tint-green)">
      <div class="ico" style="color: var(--tint-green)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.5 2.5L18 4l1 3.5L21.5 9 21 12.5 22.5 16 20 18l-1 3.5-3.5-.5L12 23l-3.5-2L5 21.5 4 18l-2.5-2L3 12.5 1.5 9 4 7.5 5 4l3.5.5z"/><path d="M8.5 12l2.5 2.5L15.5 10" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/></svg></div>
      <div><div class="t1" style="color: var(--tint-green)">Charging well at 30W</div><div class="t2">Charger and cable are well-matched.</div></div>
    </div>
    <div class="pill" style="background: var(--bg-tint-orange)">
      <div class="ico" style="color: var(--tint-orange)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 1 21h22z"/><path d="M12 9v6M12 17.5v.01" stroke="white" stroke-width="2.2" stroke-linecap="round"/></svg></div>
      <div><div class="t1" style="color: var(--tint-orange)">Cable is limiting charging speed</div><div class="t2">Charger can deliver up to 96W; cable rated 60W.</div></div>
    </div>
    <div class="pill" style="background: var(--bg-tint-accent)">
      <div class="ico" style="color: var(--tint-blue)"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 7v8M8 11l4 4 4-4" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div><div class="t1" style="color: var(--tint-blue)">WhatCable 0.2.1 is available</div><div class="t2">You're on 0.2.0</div></div>
    </div>
  </div>
</body>
</html>
