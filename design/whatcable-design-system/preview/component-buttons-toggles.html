<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WhatCable. Buttons & toggles</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./colors_and_type.css">
<style>
  :root { --font: "Geist", -apple-system, system-ui, sans-serif; }
  body {
    margin: 0; padding: 32px;
    background: #fff;
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; gap: 36px;
  }
  *, *::before, *::after { box-sizing: border-box; }

  .label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-tertiary);
    margin-bottom: 14px;
  }

  .row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }

  /* Primary. system blue, the default action */
  .btn-primary {
    font: inherit;
    font-size: 13px; font-weight: 500;
    color: #fff;
    background: #007AFF;
    border: 0;
    padding: 8px 16px;
    border-radius: 7px;
    cursor: pointer;
    letter-spacing: -0.005em;
  }
  .btn-primary:hover { background: #1A88FF; }

  /* Destructive. red, sparingly */
  .btn-destructive {
    font: inherit;
    font-size: 13px; font-weight: 500;
    color: #fff;
    background: #FF3B30;
    border: 0;
    padding: 8px 16px;
    border-radius: 7px;
    cursor: pointer;
    letter-spacing: -0.005em;
  }
  .btn-destructive:hover { background: #FF5147; }

  /* Secondary. text only, underline on hover */
  .btn-text {
    font: inherit;
    font-size: 13px; font-weight: 400;
    color: var(--fg-secondary);
    background: transparent;
    border: 0;
    padding: 8px 0;
    cursor: pointer;
    letter-spacing: -0.005em;
  }
  .btn-text:hover { color: var(--fg-primary); }

  /* Icon-only. just the glyph */
  .btn-icon {
    font: inherit;
    background: transparent;
    border: 0;
    padding: 6px;
    cursor: pointer;
    color: var(--fg-tertiary);
    display: grid; place-items: center;
    border-radius: 4px;
  }
  .btn-icon:hover { color: var(--fg-primary); }
  .btn-icon svg { width: 16px; height: 16px; }

  /* Toggle. minimal pill */
  .tog-row {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px;
    color: var(--fg-primary);
    letter-spacing: -0.005em;
    padding: 6px 0;
  }
  .tog {
    position: relative;
    width: 28px; height: 16px;
    background: rgba(0,0,0,0.15);
    border-radius: 999px;
    flex: 0 0 28px;
    transition: background 120ms;
  }
  .tog::after {
    content: "";
    position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    transition: left 120ms;
  }
  .tog.on { background: #34C759; }
  .tog.on::after { left: 14px; }

  .tog-stack { display: flex; flex-direction: column; gap: 2px; max-width: 320px; }
</style>
</head>
<body>

  <div>
    <div class="label">Buttons</div>
    <div class="row">
      <button class="btn-primary">Install update</button>
      <button class="btn-destructive">Quit WhatCable</button>
      <button class="btn-text">View release notes</button>
      <button class="btn-icon" title="Refresh" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
      </button>
      <button class="btn-icon" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
      </button>
      <button class="btn-icon" title="Close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
      </button>
    </div>
  </div>

  <div>
    <div class="label">Toggles</div>
    <div class="tog-stack">
      <div class="tog-row"><div>Show technical details</div><div style="flex:1"></div><div class="tog"></div></div>
      <div class="tog-row"><div>Hide empty ports</div><div style="flex:1"></div><div class="tog on"></div></div>
      <div class="tog-row"><div>Launch at login</div><div style="flex:1"></div><div class="tog on"></div></div>
    </div>
  </div>

</body>
</html>
