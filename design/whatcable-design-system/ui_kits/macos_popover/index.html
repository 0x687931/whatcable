<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WhatCable. Popover UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="././colors_and_type.css">
<style>
  :root {
    --font-display: "Geist", -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    --font-num: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  body {
    margin: 0; min-height: 100vh;
    background: linear-gradient(180deg, #C9D2DB 0%, #8794A2 100%);
    display: grid; place-items: center; padding: 40px 20px 60px;
    font-family: var(--font-display);
    -webkit-font-smoothing: antialiased;
  }
  *, *::before, *::after { box-sizing: border-box; }
  .popover { position: relative; width: 320px; }
  .arrow {
    position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
    width: 22px; height: 11px;
    background: rgba(252,252,253,0.97);
    clip-path: polygon(50% 0, 100% 100%, 0 100%);
  }
  .window {
    background: rgba(252,252,253,0.97);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 22px 60px rgba(0,0,0,0.30),
      0 4px 14px rgba(0,0,0,0.12),
      inset 0 0 0 0.5px rgba(0,0,0,0.10);
  }
  .header {
    display: flex; align-items: center;
    padding: 18px 22px 6px;
  }
  .title {
    font-family: var(--font-display);
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-tertiary);
  }
  .spacer { flex: 1; }
  .iconbtn {
    background: transparent; border: 0;
    padding: 4px; margin-left: 2px; border-radius: 4px;
    color: var(--fg-secondary); cursor: pointer;
    display: grid; place-items: center;
    transition: color 120ms;
  }
  .iconbtn:hover { color: var(--fg-primary); }

  .body { padding: 6px 10px 12px; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    padding: 4px 10px 14px;
  }
  .tile {
    display: flex; flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    padding: 16px 14px 14px;
    border-radius: 8px;
  }
  .tile-icon {
    display: grid; place-items: center;
    width: 24px; height: 24px;
    margin-bottom: 4px;
  }
  .tile-name {
    font-family: var(--font-display);
    font-size: 11px; font-weight: 500;
    color: var(--fg-tertiary);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1;
  }
  .tile-value {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 500;
    color: var(--fg-primary);
    font-feature-settings: "tnum";
    letter-spacing: -0.025em;
    line-height: 1;
  }
  .tile-verdict {
    font-family: var(--font-display);
    font-size: 12px; font-weight: 400;
    color: var(--fg-secondary);
    letter-spacing: -0.005em;
    line-height: 1.3;
  }
  .tile.muted .tile-value,
  .tile.muted .tile-verdict { color: var(--fg-tertiary); }

  .row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 12px;
    border-top: 1px solid rgba(0,0,0,0.06);
    width: 100%;
  }
  .row:first-child { border-top: 0; }

  .row-icon {
    flex: 0 0 28px;
    display: grid; place-items: center;
  }
  .row-text {
    flex: 1 1 auto;
    min-width: 0;
    display: flex; flex-direction: column;
    gap: 3px;
  }
  .row-name-main {
    font-family: var(--font-display);
    font-size: 14px; font-weight: 500;
    color: var(--fg-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .row-verdict {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 400;
    color: var(--fg-secondary);
    letter-spacing: -0.005em;
    line-height: 1.3;
  }
  .row-value {
    flex: 0 0 auto;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 500;
    color: var(--fg-primary);
    font-feature-settings: "tnum";
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .row.muted .row-name-main,
  .row.muted .row-value,
  .row.muted .row-verdict { color: var(--fg-tertiary); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
